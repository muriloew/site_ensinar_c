{% extends "base.html" %}
{% block title %}Desafio diário - Ensinar C{% endblock %}

{% block content %}
<div class="topbar">
    <div>
        <h1>Desafio diário</h1>
        <p>Complete o desafio de hoje para ganhar XP e manter sua sequência.</p>
    </div>
</div>

<div class="card daily-card">
    <span class="daily-icon">🏆</span>
    <h2>{{ licao.titulo }}</h2>
    <p>{{ licao.pergunta }}</p>

    <div class="quiz">
        {% for alt in licao.alternativas %}
        <button onclick="verificarResposta({{ licao.id }}, '{{ alt }}', this)">{{ alt }}</button>
        {% endfor %}
    </div>

    <p id="resultadoQuiz"></p>
    <button id="btnConcluir" class="btn btn-primary hidden" onclick="concluirLicao({{ licao.id }})">Concluir desafio +50 XP</button>
</div>
{% endblock %}
