<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Ensinar C{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
{% if usuario %}
<aside class="sidebar">
    <a href="/dashboard" class="brand">
        <span class="brand-icon">C</span>
        <strong>Ensinar C</strong>
    </a>

    <nav>
        <a href="/dashboard">🏠 Painel</a>
        <a href="/modulos">📚 Módulos</a>
        <a href="/desafio-diario">🎯 Desafio diário</a>
        <a href="/compilador">⚙️ Compilador</a>
        <a href="/sair" class="sair">↩ Sair</a>
    </nav>
</aside>
{% endif %}

<main class="{% if usuario %}app-main{% else %}public-main{% endif %}">
    {% block content %}{% endblock %}
</main>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
