<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ensinar C{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="topo">
        <nav class="menu">
            <a href="/" class="logo">Ensinar C</a>
            <div class="links">
                <a href="/">Início</a>
                <a href="/modulos">Módulos</a>
                <a href="#progresso">Progresso</a>
            </div>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="rodape">
        <p>Plataforma web educativa para ensino da linguagem C.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/progresso.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
